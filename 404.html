<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SimplyAuth — Redirecting...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      width: 72px;
      height: 72px;
      background: #2563eb;
      border-radius: 18px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { width: 40px; height: 40px; fill: #fff; }
    h1 { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
    p  { font-size: 15px; color: #64748b; line-height: 1.5; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      width: 100%;
    }
    .btn:active { opacity: 0.85; }
    .store-note {
      margin-top: 16px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <!-- Simple shield checkmark icon -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L4 5v6c0 5.25 3.5 10.15 8 11.35C16.5 21.15 20 16.25 20 11V5L12 2zm-1.5 9.5l-2-2 1.06-1.06 1.44 1.44 3.44-3.44 1.06 1.06-4.5 4.5z"/>
    </svg>
  </div>

  <h1 id="heading">You've been invited!</h1>
  <p id="message">
    Opening SimplyAuth…<br/>
    If the app isn't installed yet, we'll take you to the store.
  </p>

  <button class="btn" id="storeBtn" style="display:none" onclick="goToStore()">
    Get SimplyAuth
  </button>

  <p class="store-note" id="storeNote" style="display:none">
    After installing, the invitation will be waiting for you.
  </p>
</div>

<script>
  // ─── Detect path type: /invite/CODE or /refer/CODE ─────────────────────────
  var path = window.location.pathname;
  var pathParts = path.split('/');
  var code = pathParts[pathParts.length - 1] || '';
  var isReferral = path.indexOf('/refer/') !== -1;
  var isInvite = path.indexOf('/invite/') !== -1;

  // ─── Build deep link URL based on type ─────────────────────────────────────
  var appUrl = isReferral
    ? 'simplyauth://refer/' + code
    : 'simplyauth://invite/' + code;

  var clipboardUrl = isReferral
    ? 'https://simplyauth.app/refer/' + code
    : 'https://simplyauth.app/invite/' + code;

  // ─── Update heading/message for referrals ──────────────────────────────────
  if (isReferral) {
    document.getElementById('heading').textContent = "You've been referred!";
    document.getElementById('message').innerHTML =
      'Opening SimplyAuth\u2026<br/>If the app isn\u2019t installed yet, we\u2019ll take you to the store.';
  }

  // ─── Store redirect URLs ─────────────────────────────────────────────────────
  var IOS_STORE    = 'https://apps.apple.com/app/id__APP_ID__';
  var ANDROID_STORE = 'https://play.google.com/store/apps/details?id=app.simplyauth';

  function isIOS()     { return /iP(hone|ad|od)/.test(navigator.userAgent); }
  function isAndroid() { return /Android/.test(navigator.userAgent); }

  function goToStore() {
    if (isIOS())     { window.location.href = IOS_STORE; }
    else if (isAndroid()) { window.location.href = ANDROID_STORE; }
    else { /* Desktop — just show the card */ }
  }

  function showStorePrompt() {
    document.getElementById('heading').textContent = 'Get SimplyAuth first';
    document.getElementById('message').textContent = isReferral
      ? 'Install SimplyAuth to claim your free month of Personal. The referral link has been saved to your clipboard.'
      : 'Install SimplyAuth to accept this invitation. The invite code has been saved to your clipboard.';
    document.getElementById('storeBtn').style.display  = 'block';
    document.getElementById('storeNote').style.display = 'block';
  }

  // ─── Copy URL to clipboard (deferred deep link fallback) ───────────────────
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(clipboardUrl).catch(function() {});
  } else {
    try {
      var ta = document.createElement('textarea');
      ta.value = clipboardUrl;
      ta.style.position = 'fixed';
      ta.style.opacity  = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    } catch(e) {}
  }

  // ─── Try to open the app. Fall back to store after 1.5 seconds ──────────────
  if (isIOS() || isAndroid()) {
    window.location.href = appUrl;
    setTimeout(function() {
      showStorePrompt();
    }, 1500);
  } else {
    showStorePrompt();
  }
</script>
</body>
</html>
